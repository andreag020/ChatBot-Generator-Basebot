services:
  - type: web
    name: virtual-whatsapp-assistant
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: BOT_PAYLOAD_B64
        sync: false
        # Paste the Base64 configuration payload generated by the platform
      - key: WHATSAPP_TOKEN
        sync: false
        # WhatsApp Permanent Access Token (from Meta for Developers)
      - key: WHATSAPP_PHONE_ID
        sync: false
        # WhatsApp Phone Number ID (from Meta for Developers)
      # ── AI Provider Keys ─────────────────────────────────────────
      # Fill in ONLY the key that matches your chosen AI_PROVIDER.
      - key: ANTHROPIC_API_KEY
        sync: false
        # Required if AI_PROVIDER=anthropic (e.g. claude-3-haiku-20240307)
      - key: OPENROUTER_API_KEY
        sync: false
        # Required if AI_PROVIDER=openrouter
      - key: GEMINI_API_KEY
        sync: false
        # Required if AI_PROVIDER=gemini
